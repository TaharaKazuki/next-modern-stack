version: 2
updates:
  # Keep pinned action SHAs up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dependency updates arrive as PRs, so every bump goes through CI + the
  # security workflow before merging (versions are pinned exact in manifests)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Same idea as bunfig's minimumReleaseAge: let new releases soak for a
    # week before Dependabot proposes them
    cooldown:
      default-days: 7
