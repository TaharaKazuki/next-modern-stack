name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly (Mon 09:00 JST): catch newly disclosed vulns even without commits
    - cron: "0 0 * * 1"
  workflow_dispatch:

# Least-privilege token for every job
permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Layer 3: known-vulnerability scan of the lockfile (OSV database)
  osv-scanner:
    name: OSV-Scanner (vulnerability scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install OSV-Scanner via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v2.4.0 --repo google/osv-scanner --pattern 'osv-scanner_linux_amd64'
          chmod +x osv-scanner_linux_amd64
      - name: Run OSV-Scanner against bun.lock
        # Ignored advisories are documented in osv-scanner.toml
        run: ./osv-scanner_linux_amd64 scan source --lockfile=bun.lock --format=table

  # Layer 3 (complement): Bun's native audit against the npm advisory DB
  bun-audit:
    name: bun audit (vulnerability scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # GHSA-qx2v-qp2m-jg93 (postcss, build-time only) is pinned by next@16.2.9
      # — see osv-scanner.toml for the full rationale
      - run: bun audit --ignore=GHSA-qx2v-qp2m-jg93

  # Layer 4: secret detection over the full git history
  gitleaks:
    name: gitleaks (secret detection)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install gitleaks via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v8.30.1 --repo gitleaks/gitleaks --pattern 'gitleaks_8.30.1_linux_x64.tar.gz'
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz gitleaks
      # False positives are pinned by fingerprint in .gitleaksignore
      - name: Run gitleaks
        run: ./gitleaks git . --verbose

  # Layer 5: static analysis for dangerous code patterns
  semgrep:
    name: Semgrep (static analysis)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep:1.170.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run Semgrep
        run: >
          semgrep scan
          --config p/typescript
          --config p/javascript
          --config p/security-audit
          --error

  # Layer 7: dependency hygiene analysis (informational — never blocks)
  e18e:
    name: e18e (dependency analysis)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx @e18e/cli analyze

  # Layers 1, 2 and 6 are enforced by Bun itself (see bunfig.toml):
  #   Layer 1  install.exact              — no ^ / ~ version ranges
  #   Layer 2  (Bun default)              — dependency lifecycle scripts never
  #                                         run unless in trustedDependencies
  #   Layer 6  install.minimumReleaseAge  — 3-day quarantine for new releases
